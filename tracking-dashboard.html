<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Tracking - novo1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { color: #333; margin-bottom: 10px; }
        .header p { color: #666; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #667eea; }
        .clicks-table { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
        .clicks-table h2 { margin-bottom: 20px; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; color: #666; font-weight: 600; }
        tr:hover { background: #f9f9f9; }
        .button-group { margin-top: 20px; display: flex; gap: 10px; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button.danger { background: #e74c3c; }
        button.success { background: #27ae60; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard de Tracking - novo1</h1>
            <p>Monitoramento de cliques em links do Telegram com mensagem por botão</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><h3>Total de Cliques</h3><div class="number" id="totalClicks">0</div></div>
            <div class="stat-card"><h3>Botões Únicos Clicados</h3><div class="number" id="uniqueButtons">0</div></div>
            <div class="stat-card"><h3>Último Clique</h3><div class="number" id="lastClick" style="font-size:18px">-</div></div>
        </div>
        <div class="clicks-table">
            <h2>📝 Histórico de Cliques</h2>
            <div id="tableContainer"></div>
            <div class="button-group">
                <button onclick="exportData()" class="success">📥 Exportar CSV</button>
                <button onclick="clearData()" class="danger">🗑️ Limpar Dados</button>
                <button onclick="refreshData()">🔄 Atualizar</button>
            </div>
        </div>
    </div>
    <script>
        function loadData() {
            const clicks = JSON.parse(localStorage.getItem('telegram_clicks') || '[]');
            document.getElementById('totalClicks').textContent = clicks.length;
            const uniqueButtons = new Set(clicks.map(c => c.buttonLabel)).size;
            document.getElementById('uniqueButtons').textContent = uniqueButtons;
            if (clicks.length > 0) {
                const lastClick = new Date(clicks[clicks.length - 1].timestamp);
                document.getElementById('lastClick').textContent = lastClick.toLocaleString('pt-BR');
            }
            const tableContainer = document.getElementById('tableContainer');
            if (clicks.length === 0) { tableContainer.innerHTML = '<div class="empty-state">📭 Nenhum clique registrado ainda</div>'; return; }
            const table = document.createElement('table');
            table.innerHTML = '<thead><tr><th>Data/Hora</th><th>Botão / Label</th><th>Produto na Mensagem</th><th>Link Gerado</th></tr></thead><tbody>' +
                clicks.slice().reverse().map(c => '<tr><td>' + new Date(c.timestamp).toLocaleString('pt-BR') + '</td><td>' + (c.buttonLabel||'-') + '</td><td>' + (c.product||'-') + '</td><td style="font-size:11px;word-break:break-all">' + (c.link||'-') + '</td></tr>').join('') +
                '</tbody>';
            tableContainer.innerHTML = '';
            tableContainer.appendChild(table);
        }
        function exportData() {
            const clicks = JSON.parse(localStorage.getItem('telegram_clicks') || '[]');
            if (clicks.length === 0) { alert('Nenhum dado para exportar'); return; }
            let csv = 'Data,Horario,Botao,Produto,Link\n';
            clicks.forEach(c => {
                const date = new Date(c.timestamp);
                csv += '"' + date.toLocaleDateString() + '","' + date.toLocaleTimeString() + '","' + (c.buttonLabel||'').replace(/"/g,'""') + '","' + (c.product||'').replace(/"/g,'""') + '","' + (c.link||'') + '"\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', 'telegram_clicks.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        function clearData() { if (confirm('Tem certeza?')) { localStorage.removeItem('telegram_clicks'); refreshData(); } }
        function refreshData() { loadData(); }
        loadData();
        setInterval(refreshData, 5000);
    </script>
</body>
</html>
